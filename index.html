<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Manajemen Lapangan Telekomunikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-blue-500 selection:text-white">

    <div id="auth-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 fade-in">
            <div class="text-center mb-6">
                <div class="bg-blue-600 text-white w-12 h-12 rounded-xl flex items-center justify-center mx-auto text-xl font-bold shadow-lg shadow-blue-200 mb-3">
                    <i class="fa-solid fa-tower-cell"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-900" id="auth-title">ARWANA SYNERGY</h2>
                <p class="text-slate-500 text-xs mt-1">Sistem Kontrol Data Arwana Synergy</p>
            </div>
            
            <form id="auth-form" class="space-y-4">
                <div id="register-fields" class="hidden">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Nama Lengkap</label>
                    <input type="text" id="auth-nama" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Email Address</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Password</label>
                    <input type="password" id="auth-password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:outline-none focus:border-blue-500" placeholder="Minimal 6 karakter">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition duration-200 shadow-lg mt-2 text-sm active:scale-[0.99]">Masuk</button>
            </form>
            
            <div class="text-center mt-6 text-xs text-slate-600">
                <button id="toggle-auth" type="button" class="text-blue-600 font-semibold hover:underline">Belum punya akun? Daftar disini</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen lg:flex relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden lg:hidden transition-opacity duration-300 opacity-0" onclick="toggleMobileSidebar()"></div>

        <aside id="app-sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-slate-400 p-4 flex flex-col justify-between flex-shrink-0 z-50 transform -translate-x-full transition-transform duration-300 lg:translate-x-0 lg:static lg:h-screen">
            <div>
                <div class="flex items-center justify-between px-2 py-4 mb-4 border-b border-slate-800">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600 text-white p-2 rounded-lg"><i class="fa-solid fa-hard-drive"></i></div>
                        <div>
                            <h1 class="text-white font-bold text-sm leading-tight max-w-[130px] truncate" id="user-display-name">Memuat...</h1>
                            <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-blue-400 font-bold" id="user-display-role">USER</span>
                        </div>
                    </div>
                    <button onclick="toggleMobileSidebar()" class="text-slate-400 hover:text-white lg:hidden p-2">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>
                <nav class="space-y-1" id="sidebar-menu"></nav>
            </div>
            <div class="pt-4 border-t border-slate-800">
                <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-950/30 font-medium text-sm transition active:scale-[0.98]">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar Sistem
                </button>
            </div>
        </aside>

        <main class="flex-1 min-w-0 flex flex-col h-screen overflow-hidden">
            <header class="bg-white border-b border-slate-100 px-4 lg:px-6 py-3.5 flex items-center justify-between flex-shrink-0 shadow-sm z-30">
                <div class="flex items-center gap-2.5">
                    <button onclick="toggleMobileSidebar()" class="bg-slate-50 hover:bg-slate-100 text-slate-700 p-2.5 rounded-xl lg:hidden transition border border-slate-200 active:scale-95">
                        <i class="fa-solid fa-bars text-sm"></i>
                    </button>
                    <h2 class="text-base font-bold text-slate-900 truncate" id="current-menu-title">Dashboard</h2>
                </div>
                <div class="flex items-center gap-2.5">
                    <span id="salary-badge" class="text-[10px] sm:text-xs bg-emerald-50 text-emerald-700 px-2.5 py-1.5 rounded-full font-bold border border-emerald-100 hidden"></span>
                    
                    <button onclick="refreshMenuAktif()" class="bg-slate-50 text-slate-600 border border-slate-200 p-2.5 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition active:scale-95" title="Refresh Data">
                        <i class="fa-solid fa-arrows-rotate text-sm"></i>
                    </button>
                </div>
            </header>

            <div class="p-4 lg:p-6 overflow-y-auto flex-1 bg-slate-50 custom-scroll" id="content-area"></div>
        </main>
    </div>

    <div id="modal-edit-universal" class="fixed inset-0 z-50 bg-slate-900/60 items-center justify-center p-4 hidden flex">
        <div class="bg-white rounded-2xl shadow-2xl border w-full max-w-lg p-5 sm:p-6 fade-in">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="font-bold text-slate-900 text-sm uppercase tracking-wider" id="modal-edit-title">Edit Data Lapangan</h3>
                <button onclick="tutupModalEdit()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-base"></i></button>
            </div>
            <form id="form-edit-universal" class="space-y-4">
                <input type="hidden" id="edit-id-target">
                <input type="hidden" id="edit-tabel-target">
                <div id="modal-edit-fields" class="space-y-3"></div>
                <div class="flex justify-end gap-2 pt-2 border-t mt-4">
                    <button type="button" onclick="tutupModalEdit()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs px-4 py-2.5 rounded-xl">Batal</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow shadow-blue-200">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://uczqzarbuunjrkefdsdj.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_3jk79pXdGHa88negFx1TGw_z2JnHnrO"; 

        let supabase = null;
        let currentUser = null;
        let profileData = null;
        let isRegisterMode = false;
        let menuAktifSaatIni = 'dashboard';

        const baseMenus = [
            { id: 'dashboard', name: 'Dashboard', icon: 'fa-chart-pie', role: 'all' },
            { id: 'kontrol_user', name: 'Kontrol User (ACC/Gaji)', icon: 'fa-users-gear', role: 'admin' },
            { id: 'absensi', name: 'Absensi Team', icon: 'fa-user-check', role: 'all' },
            { id: 'ops', name: 'Operasional Team', icon: 'fa-wallet', role: 'all' },
            { id: 'kasbon', name: 'Menu Kasbon / Pinjaman', icon: 'fa-hand-holding-dollar', role: 'admin' }, 
            { id: 'material_node_b', name: 'Material Node-B', icon: 'fa-boxes-stacked', role: 'all' },
            { id: 'progres_node_b', name: 'Progres Node-B', icon: 'fa-bars-progress', role: 'all' },
            { id: 'tollbensin', name: 'Struk Toll & Bensin', icon: 'fa-gas-pump', role: 'all' },
            { id: 'maintenance', name: 'Maintenance Kendaraan', icon: 'fa-wrench', role: 'all' }, 
            { id: 'faktur_pajak', name: 'Faktur Pajak Kendaraan', icon: 'fa-file-invoice-dollar', role: 'all' },
            { id: 'laporan', name: 'Laporan Akhir (Download Excel)', icon: 'fa-file-excel', role: 'admin' } 
        ];

        let cacheAbsensi = [];
        let cacheOperasional = [];
        let cacheKasbon = [];
        let cacheMaterialNodeB = [];
        let cacheProgresNodeB = [];
        let cacheTollBensin = [];
        let cacheMaintenance = [];
        let cacheFakturPajak = [];
        let cacheDataLaporanMatriks = [];

        window.addEventListener('DOMContentLoaded', () => {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            setupEventListeners();
            periksaSesiLogin();
        });

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('app-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (!sidebar || !overlay) return;
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 30);
            }
        }

        function setupEventListeners() {
            document.getElementById('auth-form').addEventListener('submit', prosesAutentikasi);
            document.getElementById('form-edit-universal').addEventListener('submit', eksekusiUpdateDataMenu);
            document.getElementById('toggle-auth').addEventListener('click', () => {
                isRegisterMode = !isRegisterMode;
                document.getElementById('auth-title').innerText = isRegisterMode ? "Daftar Akun" : "ARWANA SYNERGY";
                document.getElementById('auth-submit-btn').innerText = isRegisterMode ? "Daftar" : "Masuk";
                document.getElementById('register-fields').classList.toggle('hidden', !isRegisterMode);
                document.getElementById('auth-nama').required = isRegisterMode;
                document.getElementById('toggle-auth').innerText = isRegisterMode ? "Sudah punya akun? Login" : "Belum punya akun? Daftar disini";
            });
        }

        async function periksaSesiLogin() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.user) ambilProfilDanMasuk(session.user);
            } catch(e) { console.error("Session check error", e); }
        }

        async function prosesAutentikasi(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const nama = document.getElementById('auth-nama').value;
            try {
                if (isRegisterMode) {
                    const { error } = await supabase.auth.signUp({ email, password, options: { data: { nama } } });
                    if (error) throw error;
                    alert("Registrasi sukses! Silakan hubungi admin utama untuk aktivasi akun.");
                    document.getElementById('toggle-auth').click();
                    document.getElementById('auth-form').reset();
                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    if (data?.user) ambilProfilDanMasuk(data.user);
                }
            } catch (err) { alert("Sistem Menolak: " + err.message); }
        }

        async function ambilProfilDanMasuk(user) {
            try {
                const { data: profile, error } = await supabase.from('profiles').select('*').eq('id', user.id).maybeSingle();
                if (error) throw error;
                if (!profile) { alert("Profil tidak ditemukan."); await supabase.auth.signOut(); return; }
                if (profile.role !== 'admin' && !profile.status_acc) {
                    alert("Akun Anda belum di-ACC oleh Admin."); await supabase.auth.signOut(); return;
                }
                currentUser = user;
                profileData = profile;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = profileData.nama;
                document.getElementById('user-display-role').innerText = profileData.role.toUpperCase();

                if (profileData.role === 'user') {
                    const badge = document.getElementById('salary-badge');
                    if (badge) {
                        badge.classList.remove('hidden');
                        badge.innerText = `Rp ${Number(profileData.salary_per_hari || 0).toLocaleString('id-ID')}/Hr`;
                    }
                }
                renderSidebarMenu();
                pindahMenu('dashboard');
            } catch (err) { alert("Error Profiling: " + err.message); }
        }

        function renderSidebarMenu() {
            const container = document.getElementById('sidebar-menu');
            if (!container) return;
            const userMenus = baseMenus.filter(m => m.role === 'all' || m.role === profileData.role);
            container.innerHTML = userMenus.map(m => `
                <button onclick="pindahMenu('${m.id}')" id="menu-btn-${m.id}" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition duration-150 hover:bg-slate-800 hover:text-white active:scale-[0.98]">
                    <i class="fa-solid ${m.icon} w-5 text-center text-xs"></i> <span>${m.name}</span>
                </button>
            `).join('');
        }

        function pindahMenu(menuId) {
            const targetMenu = baseMenus.find(m => m.id === menuId);
            if (targetMenu && targetMenu.role === 'admin' && profileData.role !== 'admin') {
                alert("Akses Ditolak! Khusus Admin.");
                return;
            }
            menuAktifSaatIni = menuId;
            baseMenus.forEach(m => {
                const btn = document.getElementById(`menu-btn-${m.id}`);
                if (btn) btn.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
            });
            const actBtn = document.getElementById(`menu-btn-${menuId}`);
            if (actBtn) actBtn.classList.add('bg-blue-600', 'text-white', 'shadow-md');
            
            const titleElem = document.getElementById('current-menu-title');
            if (titleElem) titleElem.innerText = targetMenu.name;
            
            const sidebar = document.getElementById('app-sidebar');
            if(sidebar && !sidebar.classList.contains('-translate-x-full') && window.innerWidth < 1024) {
                toggleMobileSidebar();
            }

            bukaKontenHalaman(menuId);
        }

        function refreshMenuAktif() {
            bukaKontenHalaman(menuAktifSaatIni);
        }

        function togglePilihSemua(masterCheckbox, className) {
            const checkboxes = document.querySelectorAll(`.${className}`);
            checkboxes.forEach(cb => cb.checked = masterCheckbox.checked);
        }

        async function hapusDataTerpilih(namaTabel, className) {
            const checkboxes = document.querySelectorAll(`.${className}:checked`);
            if (checkboxes.length === 0) {
                alert("Pilih minimal satu data untuk dihapus.");
                return;
            }
            if (!confirm(`Apakah Anda yakin ingin menghapus ${checkboxes.length} data terpilih secara permanen?`)) return;
            
            const idsTohapus = Array.from(checkboxes).map(cb => Number(cb.value));
            try {
                const { error } = await supabase.from(namaTabel).delete().in('id', idsTohapus);
                if (error) throw error;
                alert("Data terpilih berhasil dihapus!");
                refreshMenuAktif();
            } catch (err) { alert("Gagal menghapus data masal: " + err.message); }
        }

        function bukaKontenHalaman(menuId) {
            const container = document.getElementById('content-area');
            if (!container) return;
            const isAdmin = profileData.role === 'admin';
            container.innerHTML = `<div class="fade-in py-8 text-center text-xs font-semibold text-slate-400" id="page-${menuId}"><i class="fa-solid fa-spinner fa-spin mr-1"></i> Sinkronisasi database...</div>`;
            const page = document.getElementById(`page-${menuId}`);

            if (menuId === 'dashboard') {
                page.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-3.5 mb-5">
                        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between">
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Hadir Kerja</p><h3 class="text-lg font-black text-slate-900 mt-0.5" id="dash-absen">0 Hari</h3></div>
                            <div class="bg-blue-50 text-blue-600 p-2.5 rounded-xl"><i class="fa-solid fa-calendar text-sm"></i></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between">
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Salary Akhir</p><h3 class="text-lg font-black text-emerald-600 mt-0.5" id="dash-total-salary">Rp 0</h3></div>
                            <div class="bg-emerald-50 text-emerald-600 p-2.5 rounded-xl"><i class="fa-solid fa-money-bill-wave text-sm"></i></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between">
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Saldo Kas OPS</p><h3 class="text-lg font-black text-indigo-600 mt-0.5" id="dash-sisa-ops">Rp 0</h3></div>
                            <div class="bg-indigo-50 text-indigo-600 p-2.5 rounded-xl"><i class="fa-solid fa-wallet text-sm"></i></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between">
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Sisa Pinjaman</p><h3 class="text-lg font-black text-red-600 mt-0.5" id="dash-total-kasbon">Rp 0</h3></div>
                            <div class="bg-red-50 text-red-600 p-2.5 rounded-xl"><i class="fa-solid fa-hand-holding-dollar text-sm"></i></div>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between">
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Kasbon Bulan Ini</p><h3 class="text-lg font-black text-amber-600 mt-0.5" id="dash-kasbon-bulan">Rp 0</h3></div>
                            <div class="bg-amber-50 text-amber-600 p-2.5 rounded-xl"><i class="fa-solid fa-calendar-minus text-sm"></i></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-100 shadow-sm">
                        <h3 class="font-bold text-slate-900 text-sm">Wilujeng Sumping, ${profileData.nama}!</h3>
                        <p class="text-xs text-slate-500 mt-1">Jangan lupa berdoa sebelum memulai aktivitas di lapangan.</p>
                    </div>
                `;
                hitungDanMuatDashboard();
            }

            else if (menuId === 'kontrol_user') {
                page.innerHTML = `
                    <div class="bg-white p-4 sm:p-5 rounded-xl border border-slate-100 shadow-sm">
                        <div class="mb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                            <div>
                                <h3 class="font-bold text-xs uppercase tracking-wider text-slate-900">Manajemen Akses & Finansial Anggota</h3>
                                <p class="text-xs text-slate-500 mt-0.5">Kelola ACC pendaftaran, ubah hak akses, input gaji perhari, insentif, cicilan, dan total pinjaman plafon.</p>
                            </div>
                            ${isAdmin ? `<button onclick="hapusDataTerpilih('profiles', 'cb-user')" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-2 rounded-xl transition"><i class="fa-solid fa-trash-can"></i> Hapus Terpilih</button>` : ''}
                        </div>
                        <div class="overflow-x-auto custom-scroll -mx-4 sm:mx-0">
                            <div class="inline-block min-w-full align-middle px-4 sm:px-0">
                                <table class="min-w-full text-left text-xs whitespace-nowrap">
                                    <thead class="bg-slate-900 text-slate-200 font-semibold uppercase">
                                        <tr>
                                            ${isAdmin ? '<th class="px-3 py-3 w-10 text-center"><input type="checkbox" onclick="togglePilihSemua(this, \'cb-user\')"></th>' : ''}
                                            <th class="px-3 py-3">Nama Anggota</th>
                                            <th class="px-3 py-3">Status ACC</th>
                                            <th class="px-3 py-3">Hak Akses</th>
                                            <th class="px-3 py-3">Salary / Hari (Rp)</th>
                                            <th class="px-3 py-3">Insentif (Rp)</th>
                                            <th class="px-3 py-3">Cicilan (Rp)</th>
                                            <th class="px-3 py-3">Total Pinjaman (Rp)</th>
                                            <th class="px-3 py-3 text-center">Tindakan</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tbody-kontrol-user" class="divide-y divide-slate-100"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
                muatHalamanKontrolUser();
            }

            else if (menuId === 'absensi') {
                page.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
                        <div class="bg-white p-4 sm:p-5 rounded-xl border border-slate-100 shadow-sm h-fit">
                            <h3 class="font-bold text-xs uppercase tracking-wider text-slate-900 mb-4">Input Absensi Lapangan</h3>
                            <form id="form-absensi" class="space-y-3.5"></form>
                        </div>
                        <div class="lg:col-span-2 bg-white p-4 sm:p-5 rounded-xl border border-slate-100 shadow-sm">
                            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-3 mb-4">
                                <h3 class="font-bold text-xs uppercase tracking-wider text-slate-900">Log Kehadiran</h3>
                                <div class="flex items-center gap-2">
                                    ${isAdmin ? `<button onclick="hapusDataTerpilih('absensi', 'cb-absen')" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-2 rounded-xl transition"><i class="fa-solid fa-trash-can"></i> Hapus Terpilih</button>` : ''}
                                    <button onclick="unduhExcelSpesifik('Absensi', cacheAbsensi)" class="bg-emerald-600 text-white font-bold text-xs px-3 py-2 rounded-xl transition flex items-center justify-center gap-1 active:scale-95"><i class="fa-solid fa-file-excel"></i> Unduh Excel</button>
                                </div>
                            </div>
                            <div class="overflow-x-auto custom-scroll -mx-4 sm:mx-0">
                                <div class="inline-block min-w-full align-middle px-4 sm:px-0">
                                    <table class="min-w-full text-left text-xs whitespace-nowrap">

        async function hapusDataMenu(namaTabel, idData) {
            if (!confirm(`Apakah Anda yakin ingin menghapus data ini secara permanen dari tabel "${namaTabel}"?`)) return;
            try {
                const { error } = await supabase.from(namaTabel).delete().eq('id', idData);
                if (error) throw error;
                alert("Data berhasil terhapus!");
                refreshMenuAktif();
            } catch (err) { alert("Gagal menghapus data: " + err.message); }
        }

        async function hitungDanMuatDashboard() {
            try {
                const isAdmin = profileData.role === 'admin';
                
                if (isAdmin) {
                    const [resProfiles, resAbsensi, resKasbon, resOps] = await Promise.all([
                        supabase.from('profiles').select('*').eq('role', 'user'),
                        supabase.from('absensi').select('user_id, status_hadir'),
                        supabase.from('kasbon').select('user_id, nominal'),
                        supabase.from('operasional').select('tipe, jumlah, qty')
                    ]);

                    const profiles = resProfiles.data || [];
                    const logAbsen = resAbsensi.data || [];
                    const logKasbon = resKasbon.data || [];

                    let totalSalaryKolektifAdmin = 0;
                    profiles.forEach(p => {
                        const hadir = logAbsen.filter(a => a.user_id === p.id && a.status_hadir === 'Hadir').length;
                        const kasbonBerjalan = logKasbon.filter(k => k.user_id === p.id).reduce((sum, item) => sum + Number(item.nominal || 0), 0);
                        
                        const salaryplay = Number(p.salary_per_hari || 0);
                        const insentif = Number(p.insentif || 0);
                        const totalSalaryKotor = (hadir * salaryplay) + insentif;
                        
                        const cicilan = Number(p.cicilan_per_bulan || 0);
                        const salaryAkhirBersih = totalSalaryKotor - kasbonBerjalan - cicilan;
                        totalSalaryKolektifAdmin += (salaryAkhirBersih > 0 ? salaryAkhirBersih : 0);
                    });

                    const salEle = document.getElementById('dash-total-salary');
                    if(salEle) salEle.innerText = `Rp ${totalSalaryKolektifAdmin.toLocaleString('id-ID')}`;

                    const totalHadirAdmin = logAbsen.filter(d => d.status_hadir === 'Hadir').length;
                    const abEle = document.getElementById('dash-absen');
                    if(abEle) abEle.innerText = `${totalHadirAdmin} Hari`;

                    let totalMasukOps = 0, totalKeluarOps = 0;
                    (resOps.data || []).forEach(item => {
                        const uang = Number(item.jumlah || 0);
                        const qty = Number(item.qty || 1);
                        if (item.tipe === 'Masuk') totalMasukOps += uang;
                        else totalKeluarOps += (uang * qty);
                    });
                    const opsEle = document.getElementById('dash-sisa-ops');
                    if(opsEle) opsEle.innerText = `Rp ${Number(totalMasukOps - totalKeluarOps).toLocaleString('id-ID')}`;

                    let totalKasbonKolektif = 0;
                    logKasbon.forEach(item => totalKasbonKolektif += Number(item.nominal || 0));
                    const kbEle = document.getElementById('dash-kasbon-bulan');
                    if(kbEle) kbEle.innerText = `Rp ${totalKasbonKolektif.toLocaleString('id-ID')}`;

                    let totalSisaPinjamanKolektif = 0;
                    profiles.forEach(p => totalSisaPinjamanKolektif += Number(p.sisa_pinjaman || 0));
                    const plEle = document.getElementById('dash-total-kasbon');
                    if(plEle) plEle.innerText = `Rp ${totalSisaPinjamanKolektif.toLocaleString('id-ID')}`;

                } else {
                    let qAbsen = supabase.from('absensi').select('status_hadir').eq('user_id', currentUser.id);
                    let qOps = supabase.from('operasional').select('tipe, jumlah, qty').eq('user_id', currentUser.id);
                    let qKasbon = supabase.from('kasbon').select('nominal').eq('user_id', currentUser.id);

                    const [resAbsen, resOps, resKasbon] = await Promise.all([qAbsen, qOps, qKasbon]);

                    const totalHadir = (resAbsen.data || []).filter(d => d.status_hadir === 'Hadir').length;
                    const abEle = document.getElementById('dash-absen');
                    if(abEle) abEle.innerText = `${totalHadir} Hari`;

                    let totalMasukOps = 0, totalKeluarOps = 0;
                    (resOps.data || []).forEach(item => {
                        const uang = Number(item.jumlah || 0);
                        const qty = Number(item.qty || 1);
                        if (item.tipe === 'Masuk') totalMasukOps += uang;
                        else totalKeluarOps += (uang * qty);
                    });
                    const opsEle = document.getElementById('dash-sisa-ops');
                    if(opsEle) opsEle.innerText = `Rp ${Number(totalMasukOps - totalKeluarOps).toLocaleString('id-ID')}`;

                    let totalKasbon = 0;
                    (resKasbon.data || []).forEach(item => totalKasbon += Number(item.nominal || 0));
                    const kbEle = document.getElementById('dash-kasbon-bulan');
                    if(kbEle) kbEle.innerText = `Rp ${Number(totalKasbon).toLocaleString('id-ID')}`;

                    const sisaPinjaman = Number(profileData.sisa_pinjaman || 0);
                    const plEle = document.getElementById('dash-total-kasbon');
                    if(plEle) plEle.innerText = `Rp ${Number(sisaPinjaman).toLocaleString('id-ID')}`;

                    const salaryPerHari = Number(profileData.salary_per_hari || 0);
                    const insentif = Number(profileData.insentif || 0);
                    const cicilan = Number(profileData.cicilan_per_bulan || 0);
                    const totalGajiKotor = (totalHadir * salaryPerHari) + insentif;
                    const gajiBersih = totalGajiKotor - totalKasbon - cicilan;

                    const salEle = document.getElementById('dash-total-salary');
                    if(salEle) salEle.innerText = `Rp ${Number(gajiBersih > 0 ? gajiBersih : 0).toLocaleString('id-ID')}`;
                }

            } catch (err) { console.error("Dash error:", err.message); }
        }

        async function muatLaporanMatriksFinansial() {
            try {
                const tbody = document.getElementById('tbody-laporan-matriks');
                if(!tbody) return;

                const [resProfiles, resAbsensi, resKasbon] = await Promise.all([
                    supabase.from('profiles').select('*').eq('role', 'user'),
                    supabase.from('absensi').select('user_id, status_hadir'),
                    supabase.from('kasbon').select('user_id, nominal')
                ]);

                const profiles = resProfiles.data || [];
                const logAbsen = resAbsensi.data || [];
                const logKasbon = resKasbon.data || [];

                cacheDataLaporanMatriks = profiles.map((p, idx) => {
                    const hadir = logAbsen.filter(a => a.user_id === p.id && a.status_hadir === 'Hadir').length;
                    const kasbonBerjalan = logKasbon.filter(k => k.user_id === p.id).reduce((sum, item) => sum + Number(item.nominal || 0), 0);
                    
                    const salaryplay = Number(p.salary_per_hari || 0);
                    const insentif = Number(p.insentif || 0);
                    const totalSalaryKotor = (hadir * salaryplay) + insentif;
                    
                    const cicilan = Number(p.cicilan_per_bulan || 0);
                    const totalPinjamanPlafon = Number(p.sisa_pinjaman || 0);
                    const salaryAkhirBersih = totalSalaryKotor - kasbonBerjalan - cicilan;

                    return {
                        no_id: idx + 1,
                        nama: p.nama,
                        absen: hadir,
                        salary_perhari: salaryplay,
                        insentif: insentif,
                        total_salary: totalSalaryKotor,
                        total_pinjaman: totalPinjamanPlafon,
                        kasbon_perbulan: kasbonBerjalan,
                        cicilan: cicilan,
                        sisa_pinjaman: totalPinjamanPlafon - cicilan > 0 ? totalPinjamanPlafon - cicilan : 0,
                        salary_akhir: salaryAkhirBersih > 0 ? salaryAkhirBersih : 0
                    };
                });

                if (cacheDataLaporanMatriks.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="10" class="p-3 text-center text-slate-400">Tidak ada data user.</td></tr>`;
                    return;
                }

                tbody.innerHTML = cacheDataLaporanMatriks.map(r => `
                    <tr class="hover:bg-slate-50 font-medium">
                        <td class="p-3 font-bold text-slate-800">${r.nama}</td>
                        <td class="p-3">${r.absen} Hari</td>
                        <td class="p-3">Rp ${r.salary_perhari.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-blue-600">Rp ${r.insentif.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-emerald-600 font-bold">Rp ${r.total_salary.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-slate-500">Rp ${r.total_pinjaman.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-red-500">Rp ${r.kasbon_perbulan.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-red-600">Rp ${r.cicilan.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-amber-600 font-semibold">Rp ${r.sisa_pinjaman.toLocaleString('id-ID')}</td>
                        <td class="p-3 bg-blue-50 text-blue-900 font-black text-xs">Rp ${r.salary_akhir.toLocaleString('id-ID')}</td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Matriks Error:", err.message); }
        }

        function unduhExcelSpesifik(namaMenu, arrayData) {
            if(!arrayData || arrayData.length === 0) { alert("Data log kosong."); return; }
            const cleanData = arrayData.map(item => {
                let obj = {};
                for(let key in item) {
                    if (key !== "id" && key !== "user_id" && key !== "created_at" && key !== "foto_struk") {
                        obj[key.toUpperCase()] = item[key];
                    }
                }
                return obj;
            });
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(cleanData);
            XLSX.utils.book_append_sheet(wb, ws, "Log " + namaMenu);
            XLSX.writeFile(wb, `REKAP_${namaMenu.toUpperCase()}_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        function unduhSpreadsheetFormatFoto() {
            if(!cacheDataLaporanMatriks || cacheDataLaporanMatriks.length === 0) { alert("Data rekap kosong."); return; }
            const dataSiapCetak = cacheDataLaporanMatriks.map(r => ({
                "ID": r.no_id, "NAMA ANGGOTA": r.nama, "ABSEN (HARI)": r.absen, "SALARY PERHARI": r.salary_perhari,
                "INSENTIF": r.insentif, "TOTAL SALARY": r.total_salary, "TOTAL PINJAMAN": r.total_pinjaman,
                "KASBON PERBULAN": r.kasbon_perbulan, "CICILAN": r.cicilan, "SISA PINJAMAN": r.sisa_pinjaman, "SALARY AKHIR": r.salary_akhir
            }));
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(dataSiapCetak);
            XLSX.utils.book_append_sheet(wb, ws, "Rekap Finansial Tim");
            XLSX.writeFile(wb, `LAPORAN_AKHIR_TIM_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
